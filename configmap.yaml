apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otel-gateway.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otel-gateway.labels" . | nindent 4 }}
data:
  config.yaml: |
{{- if .Values.collectorConfigOverride }}
{{ .Values.collectorConfigOverride | indent 4 }}
{{- else }}
    extensions:
      health_check:
        endpoint: 0.0.0.0:{{ .Values.ports.health }}
      pprof:
        endpoint: 0.0.0.0:{{ .Values.ports.pprof }}

    receivers:
      # Receive telemetry from agents via OTLP
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.ports.otlpGrpc }}
          http:
            endpoint: 0.0.0.0:{{ .Values.ports.otlpHttp }}

    processors:
      memory_limiter:
        check_interval: {{ .Values.processors.memoryLimiter.checkInterval }}
        limit_mib: {{ .Values.processors.memoryLimiter.limitMib }}
        spike_limit_mib: {{ .Values.processors.memoryLimiter.spikeLimitMib }}

      batch:
        timeout: {{ .Values.processors.batch.timeout }}
        send_batch_size: {{ .Values.processors.batch.sendBatchSize }}
        send_batch_max_size: {{ .Values.processors.batch.sendBatchMaxSize }}

      resource/gateway:
        attributes:
          {{- range $k, $v := .Values.processors.resourceAttributes }}
          - key: {{ $k }}
            value: {{ $v | quote }}
            action: upsert
          {{- end }}

      {{- if and .Values.metricCounting .Values.metricCounting.enabled }}
      # The count connector emits DELTA-temporality sums. Prometheus (and the
      # prometheusremotewrite exporter) only accepts CUMULATIVE sums, so convert
      # here before remote-write — otherwise the count metric is silently dropped.
      deltatocumulative: {}

      # Drop the RAW metrics generated by the agent's receiver_creator (they all
      # carry the resource attribute discovered.by="receiver-creator"), while
      # KEEPING the count metric the count connector emits. So the agent forwards
      # everything untouched; the gateway is where the raw high-cardinality
      # receiver_creator data points are counted AND then dropped.
      filter/drop_receiver_creator_raw:
        error_mode: ignore
        metrics:
          metric:
            - 'resource.attributes["discovered.by"] == "receiver-creator" and name != {{ .Values.metricCounting.metricName | quote }}'
      {{- end }}

    {{- if and .Values.metricCounting .Values.metricCounting.enabled }}
    connectors:
      # count connector: counts metric data points arriving from the agents and
      # emits ONE small count metric per job/rule. It runs HERE in the gateway
      # (not the agent). The agent simply forwards all raw metrics.
      count:
        datapoints:
          {{ .Values.metricCounting.metricName }}:
            description: {{ .Values.metricCounting.description | quote }}
            attributes:
              {{- range .Values.metricCounting.dimensions }}
              - key: {{ .key }}
                default_value: {{ .defaultValue | quote }}
              {{- end }}
    {{- end }}

    exporters:
      prometheusremotewrite:
        endpoint: {{ .Values.prometheus.remoteWriteEndpoint | quote }}
        tls:
          insecure: {{ .Values.prometheus.tlsInsecure }}
        resource_to_telemetry_conversion:
          enabled: {{ .Values.prometheus.resourceToTelemetryConversion }}
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
      {{- if .Values.debug.enabled }}
      debug:
        verbosity: {{ .Values.debug.verbosity }}
      {{- end }}

    service:
      extensions: [health_check, pprof]
      pipelines:
      {{- if and .Values.metricCounting .Values.metricCounting.enabled }}
        # --------------------------------------------------------------
        # COUNT-IN-GATEWAY, THEN-DROP mode
        # --------------------------------------------------------------
        # 1) metrics/ingest: receive raw metrics from the agents and feed them
        #    to the `count` connector so it can measure them per job/rule.
        metrics/ingest:
          receivers: [otlp]
          processors: [memory_limiter, resource/gateway]
          exporters: [count]
        # 2) metrics/out: the same raw metrics (via otlp) plus the count metric
        #    the connector produced (via count) both flow here. The filter drops
        #    the raw receiver_creator data points (keeping only the count metric),
        #    deltatocumulative fixes the count's temporality, and the survivors
        #    go to Prometheus.
        metrics/out:
          receivers: [otlp, count]
          processors: [memory_limiter, filter/drop_receiver_creator_raw, deltatocumulative, resource/gateway, batch]
          exporters: [prometheusremotewrite{{ if .Values.debug.enabled }}, debug{{ end }}]
      {{- else }}
        # Plain pass-through: everything the agents send goes to Prometheus.
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource/gateway, batch]
          exporters: [prometheusremotewrite{{ if .Values.debug.enabled }}, debug{{ end }}]
      {{- end }}
{{- end }}
